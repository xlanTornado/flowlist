name: Build Windows

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    outputs:
      portable: ${{ steps.vars.outputs.portable }}
      msi: ${{ steps.vars.outputs.msi }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: bun install

      - name: Build
        run: bun run tauri build

      - name: Set artifact paths
        id: vars
        shell: pwsh
        run: |
          $portable = Get-ChildItem -Path src-tauri/target/release -Filter flowlist.exe | Select-Object -First 1
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi -Filter *.msi | Select-Object -First 1
          "portable=$($portable.FullName)" >> $env:GITHUB_OUTPUT
          "msi=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          "msi_name=$($msi.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: FlowList-portable
          path: ${{ steps.vars.outputs.portable }}

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: FlowList-msi
          path: ${{ steps.vars.outputs.msi }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: FlowList-portable

      - uses: actions/download-artifact@v4
        with:
          name: FlowList-msi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flowlist.exe
            *.msi
          draft: false
          prerelease: false
          generate_release_notes: true
